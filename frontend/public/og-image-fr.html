<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0f1c2e 0%, #1a2d45 50%, #162438 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    padding: 64px 80px;
    overflow: hidden;
    position: relative;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 48px;
  }
  .logo-row img {
    width: 72px;
    height: 72px;
  }
  .logo-row span {
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .slogan {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -1.5px;
    max-width: 1050px;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .footer {
    font-size: 28px;
    color: rgba(197, 216, 234, 0.85);
    letter-spacing: 0.5px;
  }
  .glow {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(64, 124, 176, 0.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .accent-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #739e82, #407cb0);
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="logo-row">
    <img src="logo-dark.svg" alt="Alma Lex">
    <span>Alma Lex</span>
  </div>
  <div class="slogan">
    Comprendre le droit suisse.<br>En quelques secondes.
  </div>
  <div class="footer">100% gratuit&nbsp; |&nbsp; Open Source&nbsp; |&nbsp; IA de Suisse</div>
  <div class="accent-bar"></div>
</body>
</html>
